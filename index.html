<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuboflo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  }
  canvas#bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }
  .ring {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(224,48,32,0.12);
    z-index: 1;
    pointer-events: none;
    animation: ringexpand 3.5s ease-out infinite;
    top: 50%; left: 50%;
  }
  .ring:nth-child(3) { animation-delay: 1.1s; }
  .ring:nth-child(4) { animation-delay: 2.2s; }
  @keyframes ringexpand {
    0%   { width: 100px; height: 100px; opacity: 0.6; margin: -50px 0 0 -50px; }
    100% { width: 900px; height: 900px; opacity: 0; margin: -450px 0 0 -450px; }
  }
  .logo-text {
    position: relative;
    z-index: 10;
    font-size: clamp(64px, 14vw, 130px);
    font-weight: 900;
    letter-spacing: -2px;
    background: linear-gradient(90deg, #E03020 0%, #ff6b4a 40%, #E03020 60%, #c01a10 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite, pulse 2.5s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(224,48,32,0.4));
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>
<div class="logo-text">Nuboflo</div>
<script>
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let W, H, nodes = [], t = 0;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); init(); });

  function rand(a, b) { return a + Math.random() * (b - a); }

  function init() {
    nodes = [];
    const n = Math.floor(W * H / 5500);
    for (let i = 0; i < n; i++) {
      nodes.push({
        x: rand(0, W), y: rand(0, H),
        r: rand(1.2, 2.8),
        vx: rand(-0.18, 0.18), vy: rand(-0.18, 0.18),
        life: rand(0, Math.PI * 2)
      });
    }
  }
  init();

  // Satellite
  let sat = spawnSat();
  function spawnSat() {
    const edge = Math.floor(Math.random() * 4);
    let x, y, angle;
    if (edge === 0) { x = rand(-60, W + 60); y = -60; angle = rand(20, 160); }
    else if (edge === 1) { x = W + 60; y = rand(-60, H + 60); angle = rand(110, 250); }
    else if (edge === 2) { x = rand(-60, W + 60); y = H + 60; angle = rand(200, 340); }
    else { x = -60; y = rand(-60, H + 60); angle = rand(290, 430); }
    const rad = angle * Math.PI / 180;
    const speed = rand(0.4, 0.9);
    return { x, y, vx: Math.cos(rad) * speed, vy: Math.sin(rad) * speed, angle: rad, trail: [], size: rand(3.5, 5.5), delay: rand(200, 600), active: false, timer: 0 };
  }

  function drawSat(s) {
    if (!s.active) return;
    const ax = s.x, ay = s.y, a = s.angle;
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(a);

    // trail
    for (let i = 0; i < s.trail.length; i++) {
      const pt = s.trail[i];
      const alpha = (i / s.trail.length) * 0.35;
      ctx.beginPath();
      ctx.arc(pt.x - ax, pt.y - ay, 1, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${alpha})`;
      ctx.fill();
    }

    const sz = s.size;
    // body
    ctx.fillStyle = 'rgba(210,220,240,0.92)';
    ctx.fillRect(-sz, -sz * 0.5, sz * 2, sz);

    // solar panels left
    ctx.fillStyle = 'rgba(60,100,200,0.85)';
    ctx.fillRect(-sz * 3.2, -sz * 0.8, sz * 2, sz * 1.6);
    ctx.strokeStyle = 'rgba(150,180,255,0.5)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(-sz * 3.2, -sz * 0.8, sz * 2, sz * 1.6);
    // panel divider
    ctx.beginPath();
    ctx.moveTo(-sz * 2.2, -sz * 0.8);
    ctx.lineTo(-sz * 2.2, sz * 0.8);
    ctx.stroke();

    // solar panels right
    ctx.fillStyle = 'rgba(60,100,200,0.85)';
    ctx.fillRect(sz * 1.2, -sz * 0.8, sz * 2, sz * 1.6);
    ctx.strokeStyle = 'rgba(150,180,255,0.5)';
    ctx.strokeRect(sz * 1.2, -sz * 0.8, sz * 2, sz * 1.6);
    ctx.beginPath();
    ctx.moveTo(sz * 2.2, -sz * 0.8);
    ctx.lineTo(sz * 2.2, sz * 0.8);
    ctx.stroke();

    // connector arms
    ctx.strokeStyle = 'rgba(180,200,240,0.6)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-sz, 0); ctx.lineTo(-sz * 1.2, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sz, 0); ctx.lineTo(sz * 1.2, 0); ctx.stroke();

    // antenna
    ctx.strokeStyle = 'rgba(220,230,255,0.7)';
    ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(0, -sz * 0.5); ctx.lineTo(0, -sz * 1.8); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, -sz * 1.9, sz * 0.18, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,220,255,0.9)'; ctx.fill();

    // glint
    ctx.beginPath();
    ctx.arc(-sz * 0.3, -sz * 0.2, sz * 0.22, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fill();

    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 0.012;

    // satellite logic
    sat.timer++;
    if (!sat.active && sat.timer > sat.delay) sat.active = true;
    if (sat.active) {
      sat.trail.push({ x: sat.x, y: sat.y });
      if (sat.trail.length > 55) sat.trail.shift();
      sat.x += sat.vx; sat.y += sat.vy;
      if (sat.x < -150 || sat.x > W + 150 || sat.y < -150 || sat.y > H + 150) {
        sat = spawnSat();
      }
    }

    for (let i = 0; i < nodes.length; i++) {
      const nd = nodes[i];
      nd.x += nd.vx; nd.y += nd.vy;
      if (nd.x < 0) nd.x = W;
      if (nd.x > W) nd.x = 0;
      if (nd.y < 0) nd.y = H;
      if (nd.y > H) nd.y = 0;
      nd.life += 0.018;
      const alpha = 0.25 + 0.18 * Math.sin(nd.life);
      ctx.beginPath();
      ctx.arc(nd.x, nd.y, nd.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(224,48,32,${alpha})`;
      ctx.fill();
      for (let j = i + 1; j < nodes.length; j++) {
        const nd2 = nodes[j];
        const dx = nd2.x - nd.x, dy = nd2.y - nd.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          ctx.beginPath();
          ctx.moveTo(nd.x, nd.y);
          ctx.lineTo(nd2.x, nd2.y);
          ctx.strokeStyle = `rgba(224,48,32,${(1 - dist / 100) * 0.15})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    drawSat(sat);
    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
