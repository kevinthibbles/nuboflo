<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuboflo.ai</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }
  .ring {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(224,48,32,0.12);
    z-index: 1;
    pointer-events: none;
    animation: ringexpand 3.5s ease-out infinite;
    top: 50%; left: 50%;
  }
  .ring:nth-child(3) { animation-delay: 1.2s; }
  .ring:nth-child(4) { animation-delay: 2.4s; }
  @keyframes ringexpand {
    0%   { width: 100px; height: 100px; opacity: 0.6; margin: -50px 0 0 -50px; }
    100% { width: 900px; height: 900px; opacity: 0; margin: -450px 0 0 -450px; }
  }
  .logo-row {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: baseline;
  }
  .main {
    font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
    font-size: clamp(64px, 13vw, 130px);
    font-weight: 900;
    letter-spacing: -2px;
    background: linear-gradient(90deg, #E03020 0%, #ff6b4a 40%, #E03020 60%, #c01a10 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite, logopulse 2.5s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(224,48,32,0.4));
  }
  .suffix {
    font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
    font-size: clamp(28px, 5vw, 56px);
    font-weight: 900;
    background: linear-gradient(90deg, #E03020 0%, #ff6b4a 40%, #E03020 60%, #c01a10 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite, logopulse 2.5s ease-in-out infinite;
    opacity: 0.75;
    margin-left: 3px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @keyframes logopulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.018); }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>

<div class="logo-row">
  <span class="main">Nuboflo</span>
  <span class="suffix">.ai</span>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, nodes = [], t = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); init(); });

function rand(a, b) { return a + Math.random() * (b - a); }

function init() {
  nodes = [];
  const n = Math.floor(W * H / 6000);
  for (let i = 0; i < n; i++) {
    nodes.push({
      x: rand(0, W), y: rand(0, H),
      r: rand(1.2, 2.8),
      vx: rand(-0.18, 0.18), vy: rand(-0.18, 0.18),
      life: rand(0, Math.PI * 2)
    });
  }
}
init();

function draw() {
  ctx.clearRect(0, 0, W, H);
  t += 0.012;

  for (let i = 0; i < nodes.length; i++) {
    const nd = nodes[i];
    nd.x += nd.vx; nd.y += nd.vy;
    if (nd.x < 0) nd.x = W;
    if (nd.x > W) nd.x = 0;
    if (nd.y < 0) nd.y = H;
    if (nd.y > H) nd.y = 0;
    nd.life += 0.018;
    const alpha = 0.25 + 0.18 * Math.sin(nd.life);

    ctx.beginPath();
    ctx.arc(nd.x, nd.y, nd.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(224,48,32,${alpha})`;
    ctx.fill();

    for (let j = i + 1; j < nodes.length; j++) {
      const nd2 = nodes[j];
      const dx = nd2.x - nd.x, dy = nd2.y - nd.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        const a = (1 - dist / 100) * 0.15;
        ctx.beginPath();
        ctx.moveTo(nd.x, nd.y);
        ctx.lineTo(nd2.x, nd2.y);
        ctx.strokeStyle = `rgba(224,48,32,${a})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
